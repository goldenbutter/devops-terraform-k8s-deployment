# Continuous Deployment — runs after CI passes on pushes to main.
# Builds the Docker image and pushes it to Docker Hub with both a
# :latest tag and a commit-SHA tag for traceability.
name: CD

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Only run after the CI workflow succeeds.
    needs: []

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Authenticate with Docker Hub using repository secrets.
      # DOCKER_USERNAME and DOCKER_PASSWORD must be configured in
      # Settings → Secrets and variables → Actions.
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Build and push with two tags so the registry always has an
      # immutable commit-linked image alongside the rolling :latest.
      - name: Build and push Docker image
        run: |
          IMAGE="goldenbutter/devops-api"
          GIT_SHA=$(git rev-parse --short HEAD)

          docker build \
            -t "${IMAGE}:latest" \
            -t "${IMAGE}:${GIT_SHA}" \
            ./app

          docker push "${IMAGE}:latest"
          docker push "${IMAGE}:${GIT_SHA}"

      # Print the pushed tags for easy reference in the workflow log.
      - name: Print image info
        run: |
          echo "Pushed: goldenbutter/devops-api:latest"
          echo "Pushed: goldenbutter/devops-api:$(git rev-parse --short HEAD)"
