# Prometheus deployment and ClusterIP service.
# Runs a single replica that scrapes the devops-api pods every 15 s.
# Data is stored on an emptyDir volume (ephemeral) — acceptable for
# a portfolio demo; production would use a PersistentVolumeClaim.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  labels:
    app: prometheus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:v2.50.1
          args:
            # Tell Prometheus where to find its config file and
            # how long to keep scraped data (15 days is plenty for demos).
            - "--config.file=/etc/prometheus/prometheus.yml"
            - "--storage.tsdb.path=/prometheus"
            - "--storage.tsdb.retention.time=15d"
            - "--web.enable-lifecycle"
          ports:
            - containerPort: 9090
              protocol: TCP
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          # Mount the ConfigMap as the Prometheus config file.
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
            - name: data
              mountPath: /prometheus
      volumes:
        # The ConfigMap created in prometheus-config.yaml.
        - name: config
          configMap:
            name: prometheus-config
        # Ephemeral storage — data is lost when the pod is deleted.
        - name: data
          emptyDir: {}
---
# ClusterIP service so Grafana can reach Prometheus at
# http://prometheus.default.svc.cluster.local:9090
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  labels:
    app: prometheus
spec:
  type: ClusterIP
  selector:
    app: prometheus
  ports:
    - name: http
      port: 9090
      targetPort: 9090
      protocol: TCP
