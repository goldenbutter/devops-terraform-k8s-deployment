# Grafana deployment and NodePort service.
# Uses a NodePort so you can access the dashboards from outside the
# cluster at http://<node-ip>:30300 without needing an ingress.
# Default credentials: admin / admin (change on first login).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  labels:
    app: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:latest
          ports:
            - containerPort: 3000
              protocol: TCP
          # Environment variables configure Grafana without needing a
          # custom grafana.ini file.
          env:
            - name: GF_SECURITY_ADMIN_USER
              value: "admin"
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: "admin"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          # Mount the datasource provisioning config so Prometheus
          # appears automatically on first boot.
          volumeMounts:
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
      volumes:
        - name: datasources
          configMap:
            name: grafana-datasource
---
# NodePort service exposes Grafana on port 30300 on every cluster node.
# On kind, forward this port to localhost in the kind config or use
# kubectl port-forward svc/grafana 3000:3000.
apiVersion: v1
kind: Service
metadata:
  name: grafana
  labels:
    app: grafana
spec:
  type: NodePort
  selector:
    app: grafana
  ports:
    - name: http
      port: 3000
      targetPort: 3000
      nodePort: 30300
      protocol: TCP
