# Dev overlay — fewer replicas and lower resource limits than production.
# Apply with: kubectl apply -k deploy/k8s/kustomize/dev/
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Reference the shared base manifests.
resources:
  - ../../base

# Override the app name prefix so dev and prod resources are distinguishable.
namePrefix: dev-

# Common labels added to every resource in this overlay.
commonLabels:
  environment: dev

# Patch the deployment to run a single replica with reduced resources.
patches:
  - target:
      kind: Deployment
      name: devops-api
    patch: |
      - op: replace
        path: /spec/replicas
        value: 1
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: "25m"
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: "32Mi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: "100m"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: "64Mi"

  # Dev only needs 1-3 replicas for autoscaling tests.
  - target:
      kind: HorizontalPodAutoscaler
      name: devops-api
    patch: |
      - op: replace
        path: /spec/minReplicas
        value: 1
      - op: replace
        path: /spec/maxReplicas
        value: 3
